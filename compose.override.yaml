# Development environment override — picked up automatically by `docker compose up`.
services:
  app:
    image: ${IMAGES_PREFIX:-}strichliste-app-dev
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # Keep var/ off the bind mount: container caches stay inside, host var/ (dev.db, ...) stays untouched.
      - /app/var
    environment:
      APP_ENV: ${APP_ENV:-dev}
      FRANKENPHP_WORKER_CONFIG: watch
      # See https://xdebug.org/docs/all_settings#mode — e.g. XDEBUG_MODE=debug to step-debug.
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
    healthcheck:
      # The first dev boot may composer-install and download importmap vendors
      # before Caddy listens — give it room (probing every 5s keeps --wait fast).
      start_period: 300s
      start_interval: 5s
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true

  database:
    ports:
      # Loopback only (default credentials!) so host tools (psql, IDE, symfony serve) can connect.
      - "127.0.0.1:5433:5432"
