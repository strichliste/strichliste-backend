framework:
    secret: '%env(APP_SECRET)%'
    trusted_proxies: '%env(default::TRUSTED_PROXIES)%'
    trusted_hosts: '%env(default::TRUSTED_HOSTS)%'

    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: ~

    # Drives both directions of the /api contract: #[MapRequestPayload] deserializes
    # request bodies into the App\Dto\Api\* request DTOs, and #[Serialize] serializes
    # what the controllers return — the App\Dto\Api\* resource DTOs and the plain
    # {count, items} list arrays. src/Serializer/* only projects entities into those
    # resource DTOs; this component does the JSON encoding.
    # Note: #[Serialize] uses this component's JsonEncode defaults, which (unlike the
    # legacy $this->json() / JsonResponse) do NOT hex-escape < > & ' " in strings.
    # That byte-level change is accepted — JSON unmarshals identically either way.
    serializer:
        enabled: true

    php_errors:
        log: true
