parameters:
    # Adds a fallback DATABASE_URL if the env var is not set.
    # This allows you to run cache:warmup even if your
    # environment variables are not available yet.
    # You should not need to change this value.
    env(DATABASE_URL): ''

doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        # DBAL 4 always uses savepoints for nested transactions; the explicit
        # use_savepoints option was removed in DoctrineBundle 3.
    orm:
        # PHP 8.4 lazy objects instead of generated proxy classes; the old
        # proxy autoloader is deprecated in ORM 3.6 and gone in ORM 4.
        enable_native_lazy_objects: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        auto_mapping: true
        # Silence DBAL 3->4 deprecation warning ("Relying on non-optimal defaults for ID generation is deprecated")
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: SEQUENCE
        dql:
            datetime_functions:
                date: App\Doctrine\Functions\Date
        mappings:
            App:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
