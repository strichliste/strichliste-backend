# Use stateful CSRF so server-rendered forms work without JavaScript.
# Stateless CSRF (Symfony 7.3+ default) requires JS to swap a placeholder for the real token,
# which would break the no-JS path mandated by the roadmap.
framework:
    form:
        csrf_protection:
            enabled: true
            field_attr: []
    csrf_protection:
        enabled: true
        stateless_token_ids: []
