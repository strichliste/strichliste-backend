# OpenAPI metadata for the frozen legacy /api. Every operation and schema
# component now lives in PHP attributes on src/Controller/Api/* and the
# documentation-only carriers in src/ApiDoc/* (whose shapes mirror
# src/Serializer/* and are pinned by tests/Controller/Api/*). Only the
# document-level `info`, which has no natural per-controller home, stays here.
nelmio_api_doc:
    areas:
        default:
            path_patterns:
                - ^/api(?!/doc)
    documentation:
        info:
            title: strichliste API
            description: |
                Legacy REST API of strichliste, a digital tally sheet.

                This contract is **frozen**: external clients (Android apps,
                kiosk hardware) depend on the exact JSON shapes. All monetary
                amounts are **integer cents**. Timestamps use the
                `YYYY-MM-DD HH:MM:SS` format. Request bodies may be sent as
                JSON or form-encoded.

                Errors use a uniform envelope:
                `{"error": {"class": "...", "code": 4xx, "message": "..."}}`.
            version: '1.8'
