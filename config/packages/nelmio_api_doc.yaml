# OpenAPI metadata for the frozen legacy /api. Operations live in #[OA\*]
# attributes on src/Controller/Api/*, request payloads in App\Dto\Api\* and
# response schemas in src/ApiDoc/* (mirroring src/Serializer/*, pinned by
# tests/Controller/Api/*). Only the genuinely document-level pieces that have
# no per-controller home stay here: info, servers, the no-auth declaration,
# tag descriptions, and the shared error envelope (schema + response).
nelmio_api_doc:
    areas:
        default:
            path_patterns:
                - ^/api(?!/doc)
    documentation:
        info:
            title: strichliste API
            description: |
                Legacy REST API of strichliste, a digital tally sheet.

                This contract is **frozen**: external clients (Android apps,
                kiosk hardware) depend on the exact JSON shapes. All monetary
                amounts are **integer cents**. Timestamps use the
                `YYYY-MM-DD HH:MM:SS` format. Request bodies may be sent as
                JSON or form-encoded.

                Errors use a uniform envelope:
                `{"error": {"class": "...", "code": 4xx, "message": "..."}}`.
            version: '1.8'
        # The kiosk/LAN deployment is unauthenticated; state it explicitly.
        security: []
        servers:
            - { url: '/', description: 'This instance' }
        components:
            schemas:
                Error:
                    type: object
                    properties:
                        error:
                            type: object
                            properties:
                                class: { type: string, description: 'FQCN of the exception — the machine-readable discriminator.', example: 'App\Exception\ValidationException' }
                                code: { type: integer, example: 422 }
                                message: { type: string }
            responses:
                Error:
                    description: Error envelope (shape shared by all 4xx responses).
                    content:
                        application/json:
                            schema: { $ref: '#/components/schemas/Error' }
        # Tag descriptions for Swagger-UI grouping. The tags themselves are
        # declared per-operation via the controllers' #[OA\*] attributes;
        # these entries only attach human-readable descriptions by name.
        tags:
            - { name: user, description: 'User accounts and their balances.' }
            - { name: transaction, description: 'Deposits, dispenses, article purchases and transfers.' }
            - { name: article, description: 'Purchasable articles and their revisions.' }
            - { name: barcode, description: 'Barcodes attached to articles.' }
            - { name: tag, description: 'Tags attached to articles.' }
            - { name: settings, description: 'Server configuration exposed to clients.' }
            - { name: metrics, description: 'Global and per-user aggregate statistics.' }
