name: CI

defaults:
  run:
    working-directory: build

on:
  push:
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

# Explicitly grant permissions to create a release
permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: build

      - name: Branch Name
        id: branch_name
        run: |
          echo "SOURCE_NAME=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
          echo "SOURCE_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          echo "SOURCE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Build
        uses: php-actions/composer@v6
        with:
          php_version: "8.2"
          dev: no
          args: --optimize-autoloader
          working_dir: build

      - name: Package
        run: |
          sudo cp .env.dist .env
          sudo rm -rf var/cache/*
          # Naming the tarball directly with the tag to make the upload step simpler
          tar -czf strichliste-backend-${{ steps.branch_name.outputs.SOURCE_TAG }}.tar.gz .env *

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: Release ${{ steps.branch_name.outputs.SOURCE_TAG }}
          tag_name: ${{ steps.branch_name.outputs.SOURCE_TAG }}
          files: build/strichliste-backend-${{ steps.branch_name.outputs.SOURCE_TAG }}.tar.gz