services:
  app:
    image: ${IMAGES_PREFIX:-}strichliste-app
    restart: unless-stopped
    environment:
      # localhost = self-signed local CA, real hostname = Let's Encrypt, ":80" = plain HTTP (LAN-IP kiosks).
      SERVER_NAME: ${SERVER_NAME:-localhost}
      # Defaults to the bundled Postgres service. Set DATABASE_URL in .env to use any other
      # Doctrine DSN (MariaDB/MySQL, SQLite, external Postgres) — see .env for examples.
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-strichliste}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-strichliste}?serverVersion=${POSTGRES_VERSION:-16}&charset=${POSTGRES_CHARSET:-utf8}}
    volumes:
      # Caddy state; persisting it keeps the local CA (make tls) across recreations.
      - caddy_data:/data
      - caddy_config:/config
      # var/ holds logs and — when DATABASE_URL points at SQLite — the database itself.
      - app_var:/app/var
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - name: https
        target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      - name: http3
        target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
    depends_on:
      database:
        condition: service_healthy
        # The database service only exists while COMPOSE_PROFILES=database (see .env).
        required: false

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: unless-stopped
    # Disabled by setting COMPOSE_PROFILES= in .env when DATABASE_URL points elsewhere.
    profiles: [database]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strichliste}
      POSTGRES_USER: ${POSTGRES_USER:-strichliste}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-strichliste}", "-U", "${POSTGRES_USER:-strichliste}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

volumes:
  caddy_data:
  caddy_config:
  app_var:
  database_data:
