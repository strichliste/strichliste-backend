name: Tests

on:
  push:
  pull_request:
  schedule:
    # Weekly run so new security advisories surface without waiting for a push.
    - cron: "17 6 * * 1"

jobs:
  lint:
    name: lint (twig, yaml, container)
    runs-on: ubuntu-latest
    env:
      # lint:container and lint:twig boot the kernel; the DSN must parse but is never used.
      DATABASE_URL: "sqlite:////tmp/strichliste_lint.db"
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: ctype, iconv, json, intl, pdo_sqlite
          coverage: none

      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-php8.5-composer-${{ hashFiles('composer.lock') }}

      - run: composer validate --strict --no-check-publish

      - run: composer install --no-interaction --prefer-dist

      - run: composer audit

      - run: php bin/console lint:twig templates
      - run: php bin/console lint:yaml config translations
      - run: php bin/console lint:container

  phpunit:
    name: phpunit (${{ matrix.db }}, php ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mariadb, pgsql]
        # 8.5 only — it matches the FrankenPHP production image. (composer.json
        # still allows 8.4.1+, but we run CI against the version we deploy.)
        php: ["8.5"]
        include:
          - db: sqlite
            database_url: "sqlite:////tmp/strichliste_test.db"
            php_extensions: pdo_sqlite
          - db: mariadb
            database_url: "mysql://strichliste:strichliste@127.0.0.1:3306/strichliste?serverVersion=mariadb-11.8.0"
            php_extensions: pdo_mysql
          - db: pgsql
            database_url: "postgresql://strichliste:strichliste@127.0.0.1:5432/strichliste?serverVersion=16"
            php_extensions: pdo_pgsql

    services:
      # an empty image skips the service, so each cell only starts the database
      # it tests — previously every cell pulled both images. ECR Public mirrors
      # the Docker Hub official images without the anonymous-pull rate limits
      # that made these pulls time out.
      mariadb:
        image: ${{ matrix.db == 'mariadb' && 'public.ecr.aws/docker/library/mariadb:11.8' || '' }}
        env:
          MARIADB_DATABASE: strichliste
          MARIADB_USER: strichliste
          MARIADB_PASSWORD: strichliste
          MARIADB_ROOT_PASSWORD: root
        ports: ["3306:3306"]
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=10

      postgres:
        image: ${{ matrix.db == 'pgsql' && 'public.ecr.aws/docker/library/postgres:16' || '' }}
        env:
          POSTGRES_DB: strichliste
          POSTGRES_USER: strichliste
          POSTGRES_PASSWORD: strichliste
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U strichliste"
          --health-interval=10s --health-timeout=5s --health-retries=10

    env:
      DATABASE_URL: ${{ matrix.database_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # intl is required since the Twig UI (NumberFormatter in AppExtension).
          extensions: ctype, iconv, json, intl, ${{ matrix.php_extensions }}
          coverage: none

      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}

      - run: composer install --no-interaction --prefer-dist

      - run: vendor/bin/phpunit --testdox

  migrations:
    name: migrations idempotent on an existing schema
    runs-on: ubuntu-latest
    # Reattaching an existing database — the documented "keep your old data"
    # path — re-runs the migrations against a schema that is already there.
    # Every up() must no-op cleanly, or that path breaks. SQLite exercises the
    # platform-agnostic guards; the phpunit matrix covers fresh runs per DB.
    env:
      DATABASE_URL: "sqlite:////tmp/strichliste_idem.db"
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: ctype, iconv, json, intl, pdo_sqlite
          coverage: none

      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-php8.5-composer-${{ hashFiles('composer.lock') }}

      - run: composer install --no-interaction --prefer-dist

      # Build the schema, then forget every version record to mimic an old or
      # untracked database, then migrate again — this must exit 0.
      - run: php bin/console doctrine:migrations:migrate --no-interaction
      - run: php bin/console doctrine:migrations:version --delete --all --no-interaction
      - run: php bin/console doctrine:migrations:migrate --no-interaction

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # PHP 8.5 matches the FrankenPHP production image. The php -S dev server
      # runs with opcache JIT off (see playwright.config.js) to dodge a PHP JIT
      # segfault on the x86_64 runner that hits 8.4 and 8.5 alike.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: ctype, iconv, json, intl, pdo_sqlite
          coverage: none

      - uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-php8.5-composer-${{ hashFiles('composer.lock') }}

      - run: composer install --no-interaction --prefer-dist

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # the suite seeds var/e2e.db and boots its own PHP server (playwright.config.js)
      - run: npx playwright test

      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
